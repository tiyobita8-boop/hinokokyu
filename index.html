<!DOCTYPE html> 
<html>
<head>
  <title>Fire Breathing Timer</title>
</head>
<body id="body" style="text-align:center; font-family:sans-serif; transition:0.2s;">

<h1 id="mode">🔥 Work</h1>
<h2 id="time">2:00</h2>
<h3 id="count">周回：0</h3>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

<script>
let WORK = 2 * 60;
let FIRE = 30;
let BREAK = 30;

let timeLeft = WORK;
let mode = "work";

let timer;
let flashing = false;
let round = 0;

function formatTime(sec){
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function updateDisplay(){
  document.getElementById("time").innerText = formatTime(timeLeft);
  document.getElementById("count").innerText = "周回：" + round;

  let label = "";
  if(mode === "work") label = "🔥 Work";
  if(mode === "fire") label = "🔥 火の呼吸";
  if(mode === "break") label = "☕ 休憩";

  document.getElementById("mode").innerText = label;
}

function flashScreen(){
  if(flashing) return;
  flashing = true;

  let body = document.getElementById("body");
  let count = 0;

  let flash = setInterval(() => {
    body.style.backgroundColor = (count % 2 === 0) ? "blue" : "yellow";
    count++;
  }, 300);

  setTimeout(() => {
    clearInterval(flash);
    body.style.backgroundColor = "white";
    flashing = false;
  }, 10000);
}

function nextPhase(){
  if(mode === "work"){
    mode = "fire";
    timeLeft = FIRE;
  } else if(mode === "fire"){
    mode = "break";
    timeLeft = BREAK;
  } else {
    mode = "work";
    timeLeft = WORK;
    round++;
  }
  updateDisplay();
}

function startTimer(){
  if(timer) return;

  timer = setInterval(() => {
    timeLeft--;
    updateDisplay();

    if(timeLeft <= 0){
      flashScreen();
      nextPhase();
    }
  }, 1000);
}

function resetTimer(){
  clearInterval(timer);
  timer = null;
  mode = "work";
  timeLeft = WORK;
  round = 0;
  updateDisplay();
}

// 🔥ページ開いた瞬間に開始
window.onload = startTimer;

updateDisplay();
</script>

</body>
</html>
