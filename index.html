<!DOCTYPE html> 
<html>
<head>
  <title>Fire Breathing Loop</title>
</head>
<body id="body" style="text-align:center; font-family:sans-serif; transition:0.5s;">

<h1 id="mode">🔥 火の呼吸</h1>
<h2 id="time">1:00</h2>
<h3 id="count">周回：0</h3>

<button onclick="resetTimer()">Reset</button>

<p style="margin-top:20px; line-height:1.8;">
背筋を伸ばして座る。鼻のみで呼吸。<br>
吐いて腹をへこます。吸って腹を自然にふくらます<br>
1秒に２回のスピード<br>
体内のEを活性化。毒素排泄。血液循環活性化。丹田強化
</p>

<script>
let FIRE = 60;
let BREAK = 30;

let timeLeft = FIRE;
let mode = "fire";

let timer;
let flashing = false;
let round = 0;

function formatTime(sec){
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function updateDisplay(){
  document.getElementById("time").innerText = formatTime(timeLeft);
  document.getElementById("count").innerText = "周回：" + round;

  let label = "";
  let body = document.getElementById("body");

  if(mode === "fire"){
    label = "🔥 火の呼吸";
    body.style.backgroundColor = "red";   // 🔥赤
  } else {
    label = "☕ 休憩";
    body.style.backgroundColor = "blue";  // 🔵青
  }

  document.getElementById("mode").innerText = label;
}

// 🔵🟡 点滅（10秒）
function flashScreen(){
  if(flashing) return;
  flashing = true;

  let body = document.getElementById("body");
  let count = 0;

  let flash = setInterval(() => {
    body.style.backgroundColor = (count % 2 === 0) ? "blue" : "yellow";
    count++;
  }, 300);

  setTimeout(() => {
    flashing = false;
    clearInterval(flash);
    updateDisplay(); // ←元の色に戻す✨
  }, 10000);
}

function nextPhase(){
  if(mode === "fire"){
    mode = "break";
    timeLeft = BREAK;
  } else {
    mode = "fire";
    timeLeft = FIRE;
    round++;
  }
  updateDisplay();
}

function startTimer(){
  if(timer) return;

  timer = setInterval(() => {
    timeLeft--;
    updateDisplay();

    if(timeLeft <= 0){
      flashScreen();
      nextPhase();
    }
  }, 1000);
}

function resetTimer(){
  clearInterval(timer);
  timer = null;
  mode = "fire";
  timeLeft = FIRE;
  round = 0;
  updateDisplay();
}

// 🔥自動スタート
window.onload = startTimer;

updateDisplay();
</script>

</body>
</html>
