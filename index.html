<!DOCTYPE html> 
<html>
<head>
  <title>Fire Breathing Timer</title>
</head>
<body id="body" style="text-align:center; font-family:sans-serif; transition:0.2s;">

<h1 id="mode">Work</h1>
<h2 id="time">2:00</h2>
<button onclick="startTimer()">Start</button>
<button onclick="flashScreen()">テスト点滅</button>

<script>
let WORK = 2 * 60;   // ←25分 → 2分
let FIRE = 30;       // ←5分 → 30秒
let BREAK = 30;      //（使ってるならそのまま30秒）

let timeLeft = WORK;
let mode = "work";

let timer;
let flashing = false;

function formatTime(sec){
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function updateDisplay(){
  document.getElementById("time").innerText = formatTime(timeLeft);

  let label = "";
  if(mode === "work") label = "🔥 Work";
  if(mode === "fire") label = "🔥 火の呼吸";
  if(mode === "break") label = "☕ 休憩";

  document.getElementById("mode").innerText = label;
}

// 🔵🟡 点滅（10秒）
function flashScreen(){
  if(flashing) return;
  flashing = true;

  let body = document.getElementById("body");
  let count = 0;

  let flash = setInterval(() => {
    body.style.backgroundColor = (count % 2 === 0) ? "blue" : "yellow";
    count++;
  }, 300);

  setTimeout(() => {
    clearInterval(flash);
    body.style.backgroundColor = "white";
    flashing = false;
  }, 10000); // ←60秒 → 10秒
}

function nextPhase(){
  if(mode === "work"){
    mode = "fire";
    timeLeft = FIRE;
  } else if(mode === "fire"){
    mode = "break";
    timeLeft = BREAK;
  } else {
    mode = "work";
    timeLeft = WORK;
  }
  updateDisplay();
}

function startTimer(){
  if(timer) return;

  timer = setInterval(() => {
    timeLeft--;
    updateDisplay();

    if(timeLeft <= 0){
      flashScreen();
      nextPhase();
    }
  }, 1000);
}

updateDisplay();
</script>

</body>
</html>
